# Copy this file to your videoconverter_webm repo as:
#   .github/workflows/build-release-win.yml
# (Create .github/workflows/ if it doesn't exist.)
#
# This workflow builds the Windows portable exe on every v* tag push
# and uploads it as a release asset (draft release). No code signing here;
# add a SignPath step later if you use SignPath Foundation.

name: Build and release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable exe
        run: npm run build:win

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: dist/*.exe

      - name: Create Release (draft) and upload exe
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
